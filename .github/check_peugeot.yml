name: Peugeot Auto Check

on:
  schedule:
    - cron: '0 9 * * *' # Това ще се стартира всеки ден в 9:00 сутринта
  workflow_dispatch:   # Това добавя бутон "Пусни ръчно" в сайта на GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python peugeot_check.py
